        .logo-placeholder:hover {

        }
        .delete-logo-btn {

            right: -8px;
            background: #dc2626;

            border-radius: 50%;

            height: 24px;
            font-size: 12px;

            align-items: center;

        }

        }

            font-size: 0.9rem;
        }
        .btn-primary {

            border: none;
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .btn-primary:hover { background: #0f2b4f; }
        .btn-outline {
            background: transparent;
            border: 1px solid #cbd5e1;
            padding: 0.4rem 0.9rem;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.8rem;

        .btn-danger {

<div class="app-container">
    <div class="dashboard-header">
        <div class="header-top">
            <div class="logo-area" id="logoArea"></div>
            <div class="title-section">
                <h1><i class="fas fa-file-invoice-dollar"></i> Gestor de Gastos</h1>
                <p>Persistencia total | Haz clic en una semana para filtrar | Importa Excel fácilmente</p>
            </div>
            <div>
                <button class="btn-primary" id="btnAgregarGasto"><i class="fas fa-plus"></i> Nuevo Gasto</button>
            </div>
        </div>
        <div class="kpi-grid" id="kpiContainer"></div>
    </div>

    <!-- Filtros sin fechas desde/hasta -->
    <div class="filters-bar">
        <div class="filter-group"><label><i class="fas fa-search"></i> Buscar</label><input type="text" id="searchInput" placeholder="Proveedor / concepto"></div>
        <div class="filter-group"><label>Estado</label><select id="statusFilter"><option value="all">Todos</option><option value="PAGADO">Pagado</option><option value="PENDIENTE">Pendiente</option></select></div>
        <div class="filter-group"><label>Tipo</label><select id="typeFilter"><option value="all">Todos</option><option value="contado">Solo Contado</option><option value="credito">Solo Crédito</option></select></div>
        <button class="btn-outline" id="resetFilters"><i class="fas fa-undo-alt"></i> Limpiar todo</button>
        <div class="action-buttons">
            <button class="btn-outline btn-excel" id="importExcelBtn"><i class="fas fa-file-upload"></i> Importar Excel</button>
            <button class="btn-outline btn-excel" id="exportExcelBtn"><i class="fas fa-file-excel"></i> Exportar a Excel</button>
            <button class="btn-outline" id="printBtn"><i class="fas fa-print"></i> Imprimir</button>
        </div>
    </div>
    
    <div class="delete-all-btn">
        <button class="btn-outline btn-danger" id="deleteAllBtn"><i class="fas fa-trash-alt"></i> Eliminar TODOS los gastos</button>
    </div>

    <div class="table-wrapper">
        <table class="expense-table" id="expensesTable">
            <thead><tr><th>FECHA</th><th>PROVEEDOR</th><th>FACTURA</th><th>O.C</th><th>CONTADO</th><th>CRÉDITO</th><th>TOTAL</th><th>DESCRIPCIÓN</th><th>ESTADO</th><th>ACCIONES</th></tr</thead>
            <tbody id="tableBody"></tbody>
            <tfoot id="tableFoot">
                <tr><td colspan="4" style="text-align:right"><strong>TOTALES</strong></td><td id="footContado">0.00</td><td id="footCredito">0.00</td><td id="footTotal">0.00</td><td colspan="3"></tr>
            </tfoot>
        </table>
    </div>

    <div class="weekly-summary">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.8rem;">
            <h3><i class="far fa-calendar-alt"></i> Resumen por Semana (clic para filtrar)</h3>
            <button class="btn-outline" id="clearWeekFilterBtn" style="font-size: 0.7rem;"><i class="fas fa-times-circle"></i> Limpiar filtro semana</button>
        </div>
        <div id="weeklyList" class="weekly-grid"></div>
        <div id="activeWeekInfo" style="margin-top: 0.5rem; font-size: 0.7rem; color: #5b6e8c;"></div>
    </div>
</div>

<!-- Modal para agregar/editar gastos -->
<div id="gastoModal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle">Agregar Gasto</h2>
        <form id="gastoForm">
            <input type="hidden" id="editIndex" value="-1">
            <div class="form-group"><label>Fecha</label><input type="date" id="modalFecha" required></div>
            <div class="form-group"><label>Proveedor</label><input type="text" id="modalProveedor" required></div>
            <div class="form-group"><label>Factura</label><input type="text" id="modalFactura"></div>
            <div class="form-group"><label>O.C</label><input type="text" id="modalOC"></div>
            <div class="form-group"><label>Contado</label><input type="number" step="0.01" id="modalContado" value="0"></div>
            <div class="form-group"><label>Crédito</label><input type="number" step="0.01" id="modalCredito" value="0"></div>
            <div class="form-group"><label>Descripción</label><input type="text" id="modalDescripcion"></div>
            <div class="form-group"><label>Estado</label><select id="modalEstado"><option value="PAGADO">PAGADO</option><option value="PENDIENTE">PENDIENTE</option><option value="CANCELADA">CANCELADA</option></select></div>
            <div class="modal-buttons"><button type="button" class="btn-outline" id="closeModalBtn">Cancelar</button><button type="submit" class="btn-primary">Guardar</button></div>
        </form>
    </div>
</div>

<!-- Input oculto para seleccionar archivo Excel -->

<script>
    // ================= LOGO INTERACTIVO =================
    const logoArea = document.getElementById('logoArea');
    let currentLogoData = localStorage.getItem('santana_logo');

    function renderLogo() {
        if (currentLogoData) {
            logoArea.innerHTML = `
                <div class="logo-wrapper">
                    <img src="${currentLogoData}" class="logo-img" alt="Logo">
                    <button class="delete-logo-btn" id="deleteLogoBtn" title="Eliminar logo">✕</button>
                </div>
            `;
            const deleteBtn = document.getElementById('deleteLogoBtn');
            if (deleteBtn) {
                deleteBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (confirm('¿Eliminar el logotipo actual?')) {
                        localStorage.removeItem('santana_logo');
                        currentLogoData = null;
                        renderLogo();
                    }
                });
            }
        } else {
            logoArea.innerHTML = `<div class="logo-placeholder" id="uploadLogoPlaceholder">📷</div>`;
            const placeholder = document.getElementById('uploadLogoPlaceholder');
            if (placeholder) {
                placeholder.addEventListener('click', () => {
                    const input = document.createElement('input');
                    input.type = 'file';
                    input.accept = 'image/*';
                    input.onchange = (e) => {
                        const file = e.target.files[0];
                        if (file) {
                            const reader = new FileReader();
                            reader.onload = (ev) => {
                                currentLogoData = ev.target.result;
                                localStorage.setItem('santana_logo', currentLogoData);
                                renderLogo();
                            };
                            reader.readAsDataURL(file);
                        }
                    };
                    input.click();
                });
            }
        }
    }

    function loadFromStorage() {

        if (stored) {
            try {
                const parsed = JSON.parse(stored);
                if (Array.isArray(parsed) && parsed.length > 0) expensesData = parsed;
                else expensesData = JSON.parse(JSON.stringify(defaultExpenses));
            } catch(e) { expensesData = JSON.parse(JSON.stringify(defaultExpenses)); }
        } else {
            expensesData = JSON.parse(JSON.stringify(defaultExpenses));
        }
        expensesData.forEach(item => { item.total = (item.contado || 0) + (item.credito || 0); });
        saveToStorage();
    }
    function saveToStorage() { localStorage.setItem(STORAGE_KEY, JSON.stringify(expensesData)); }

    // Función para determinar la semana según la fecha
    function getWeekTag(dateStr) {
        const date = new Date(dateStr);
        const ranges = [
            { name: "SEMANA DEL 8 AL 14 DE DICIEMBRE 2025", start: "2025-12-08", end: "2025-12-14" },
            { name: "SEMANA DEL 5 AL 10 DE ENERO 2026", start: "2026-01-05", end: "2026-01-10" },
            { name: "SEMANA DEL 26 AL 31 DE ENERO 2026", start: "2026-01-26", end: "2026-01-31" },
            { name: "SEMANA DEL 9 AL 14 DE FEBRERO 2026", start: "2026-02-09", end: "2026-02-14" },
            { name: "SEMANA DEL 16 AL 21 DE FEBRERO 2026", start: "2026-02-16", end: "2026-02-21" },
            { name: "SEMANA DEL 23 AL 28 DE FEBRERO 2026", start: "2026-02-23", end: "2026-02-28" },
            { name: "SEMANA DEL 1 AL 8 DE MARZO 2026", start: "2026-03-01", end: "2026-03-08" },
            { name: "SEMANA DEL 9 AL 15 DE MARZO 2026", start: "2026-03-09", end: "2026-03-15" },
            { name: "SEMANA DEL 16 AL 22 DE MARZO 2026", start: "2026-03-16", end: "2026-03-22" },
            { name: "SEMANA DEL 23 AL 29 DE MARZO 2026", start: "2026-03-23", end: "2026-03-29" },
            { name: "SEMANA DEL 30 DE MARZO AL 5 DE ABRIL 2026", start: "2026-03-30", end: "2026-04-05" },
            { name: "SEMANA DEL 6 AL 12 DE ABRIL 2026", start: "2026-04-06", end: "2026-04-12" },
            { name: "SEMANA DEL 13 AL 19 DE ABRIL 2026", start: "2026-04-13", end: "2026-04-19" }
        ];
        for (let r of ranges) if (date >= new Date(r.start) && date <= new Date(r.end)) return r.name;
        return `Semana del ${date.getDate()}/${date.getMonth()+1}/${date.getFullYear()}`;
    }

    let currentWeekFilter = null;

    function getFilteredData() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const status = document.getElementById('statusFilter').value;
        const type = document.getElementById('typeFilter').value;
        let filtered = expensesData.filter(exp => {
            const matchSearch = exp.proveedor.toLowerCase().includes(search) || exp.descripcion.toLowerCase().includes(search);
            const matchStatus = status === 'all' || exp.estado === status;
            let matchType = true;
            if (type === 'contado') matchType = exp.contado > 0 && exp.credito === 0;
            if (type === 'credito') matchType = exp.credito > 0 && exp.contado === 0;
            return matchSearch && matchStatus && matchType;
        });
        if (currentWeekFilter) filtered = filtered.filter(exp => getWeekTag(exp.fecha) === currentWeekFilter);
        return filtered;
    }

    function renderTable() {
        const filtered = getFilteredData();
        const tbody = document.getElementById('tableBody');
        if (!tbody) return;
        tbody.innerHTML = '';
        let sumC = 0, sumK = 0, sumT = 0;
        filtered.forEach(item => {
            const badgeClass = item.estado === 'PAGADO' ? 'badge-pagado' : (item.estado === 'CANCELADA' ? 'badge-cancelada' : 'badge-pendiente');

            tr.innerHTML = `

    function updateKPIAndWeekly() {
        const totalAll = expensesData.reduce((a,b)=>a+b.total,0);
        const contadoAll = expensesData.reduce((a,b)=>a+b.contado,0);
        const creditoAll = expensesData.reduce((a,b)=>a+b.credito,0);
        const pagadoAll = expensesData.filter(e=>e.estado==='PAGADO').reduce((a,b)=>a+b.total,0);
        const pendienteAll = expensesData.filter(e=>e.estado==='PENDIENTE').reduce((a,b)=>a+b.total,0);
        document.getElementById('kpiContainer').innerHTML = `
            <div class="kpi-card"><div class="kpi-label">Total Gastos</div><div class="kpi-value">$${totalAll.toFixed(2)}</div></div>
            <div class="kpi-card"><div class="kpi-label">Contado</div><div class="kpi-value">$${contadoAll.toFixed(2)}</div></div>
            <div class="kpi-card"><div class="kpi-label">Crédito</div><div class="kpi-value">$${creditoAll.toFixed(2)}</div></div>
            <div class="kpi-card"><div class="kpi-label">Pagado</div><div class="kpi-value">$${pagadoAll.toFixed(2)}</div></div>
            <div class="kpi-card"><div class="kpi-label">Pendiente</div><div class="kpi-value">$${pendienteAll.toFixed(2)}</div></div>
        `;

        const weeksMap = new Map();
        expensesData.forEach(item => {
            const week = getWeekTag(item.fecha);
            weeksMap.set(week, (weeksMap.get(week) || 0) + item.total);
        });
        const container = document.getElementById('weeklyList');
        if (!container) return;
        container.innerHTML = '';
        if (weeksMap.size === 0) {
            container.innerHTML = '<div style="padding:1rem; text-align:center; color:#6c757d;">No hay gastos registrados</div>';
        } else {
            for (let [week, total] of weeksMap.entries()) {
                const div = document.createElement('div');
                div.className = `weekly-item ${currentWeekFilter === week ? 'active-week' : ''}`;
                div.innerHTML = `
                    <div class="week-info">
                        <span><i class="far fa-calendar-check"></i> ${week}</span>
                        <span><strong>$${total.toFixed(2)}</strong></span>
                    </div>
                    <i class="fas fa-trash-alt week-delete" title="Eliminar todos los gastos de esta semana"></i>
                `;
                const deleteIcon = div.querySelector('.week-delete');
                deleteIcon.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (confirm(`¿Eliminar permanentemente todos los gastos de la semana "${week}"?`)) {
                        expensesData = expensesData.filter(exp => getWeekTag(exp.fecha) !== week);
                        if (currentWeekFilter === week) currentWeekFilter = null;
                        saveToStorage();
                        renderTable();
                    }
                });
                div.addEventListener('click', (e) => {
                    if (e.target === deleteIcon || deleteIcon.contains(e.target)) return;
                    currentWeekFilter = (currentWeekFilter === week) ? null : week;
                    renderTable();
                });
                container.appendChild(div);
            }
        }
        document.getElementById('activeWeekInfo').innerHTML = currentWeekFilter ? `<i class="fas fa-filter"></i> Filtro activo: <strong>${currentWeekFilter}</strong>` : `<i class="fas fa-chart-line"></i> Haz clic en cualquier semana para filtrar la tabla.`;
    }

    // ================= FUNCIÓN DE IMPORTACIÓN (MEJORADA Y ROBUSTA) =================
    function importExcel(file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(firstSheet, { header: 1, defval: "" });
            if (!rows.length || rows.length < 2) {
                alert("El archivo no contiene datos o está vacío.");
                return;
            }
            // Normalizar encabezados (primera fila)
            const headers = rows[0].map(cell => {
                if (cell === undefined || cell === null) return "";
                return String(cell).trim().toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            });
            console.log("Encabezados detectados:", headers);
            
            // Mapear índices con nombres flexibles
            const idxFecha = headers.findIndex(h => h.includes("FECHA"));
            const idxProveedor = headers.findIndex(h => h.includes("PROVEEDOR"));
            const idxFactura = headers.findIndex(h => h.includes("FACTURA"));
            const idxOC = headers.findIndex(h => h.includes("O.C") || h === "OC");
            const idxContado = headers.findIndex(h => h.includes("CONTADO"));
            const idxCredito = headers.findIndex(h => h.includes("CREDITO") || h.includes("CRÉDITO"));
            const idxDescripcion = headers.findIndex(h => h.includes("DESCRIPCIÓN") || h.includes("DESCRIPCION"));
            const idxEstado = headers.findIndex(h => h.includes("ESTADO"));
            
            if (idxFecha === -1 || idxProveedor === -1) {
                alert("No se encontraron columnas obligatorias 'FECHA' y 'PROVEEDOR'. Las columnas detectadas son:\n" + headers.join(", "));
                return;
            }
            
            let added = 0, skipped = 0;
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (!row || row.length === 0) continue;
                const fechaRaw = row[idxFecha];
                const proveedorRaw = row[idxProveedor];
                if (!fechaRaw || !proveedorRaw) {
                    skipped++;
                    continue;
                }
                let fechaFormateada = "";
                // Convertir fecha desde número o texto
                if (typeof fechaRaw === 'number') {
                    try {
                        const date = XLSX.SSF.parse_date_code(fechaRaw);
                        fechaFormateada = `${date.y}-${String(date.m).padStart(2,'0')}-${String(date.d).padStart(2,'0')}`;
                    } catch(e) {
                        fechaFormateada = String(fechaRaw);
                    }
                } else {
                    let fechaStr = String(fechaRaw).trim();
                    // Soporte para DD/MM/AAAA o AAAA-MM-DD
                    if (fechaStr.includes("/")) {
                        const parts = fechaStr.split("/");
                        if (parts.length === 3) {
                            let d = parts[0], m = parts[1], y = parts[2];
                            if (y.length === 2) y = "20" + y;
                            fechaFormateada = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                        } else {
                            fechaFormateada = fechaStr;
                        }
                    } else {
                        fechaFormateada = fechaStr;
                    }
                }
                const proveedor = proveedorRaw.toString().trim();
                const factura = (idxFactura !== -1 && row[idxFactura]) ? row[idxFactura].toString().trim() : "";
                const oc = (idxOC !== -1 && row[idxOC]) ? row[idxOC].toString().trim() : "";
                let contado = (idxContado !== -1 && row[idxContado] !== undefined && row[idxContado] !== "") ? parseFloat(row[idxContado]) : 0;
                let credito = (idxCredito !== -1 && row[idxCredito] !== undefined && row[idxCredito] !== "") ? parseFloat(row[idxCredito]) : 0;
                if (isNaN(contado)) contado = 0;
                if (isNaN(credito)) credito = 0;
                const descripcion = (idxDescripcion !== -1 && row[idxDescripcion]) ? row[idxDescripcion].toString().trim() : "";
                let estadoRaw = (idxEstado !== -1 && row[idxEstado]) ? row[idxEstado].toString().trim().toUpperCase() : "";
                if (estadoRaw !== "PAGADO" && estadoRaw !== "CANCELADA") estadoRaw = "PENDIENTE";
                
                const total = contado + credito;
                expensesData.push({
                    fecha: fechaFormateada,
                    proveedor: proveedor,
                    factura: factura,
                    oc: oc,
                    contado: contado,
                    credito: credito,
                    total: total,
                    descripcion: descripcion,
                    estado: estadoRaw
                });
                added++;
            }
            saveToStorage();
            renderTable();
            alert(`Importación completada: ${added} registros añadidos, ${skipped} filas omitidas.`);
        };
        reader.onerror = () => alert("Error al leer el archivo. Asegúrate de que sea un Excel válido.");
        reader.readAsArrayBuffer(file);
    }

    // Eventos para importar
    document.getElementById('importExcelBtn').addEventListener('click', () => {
        document.getElementById('excelFileInput').click();
    });
    document.getElementById('excelFileInput').addEventListener('change', (e) => {
        if (e.target.files.length) {
            importExcel(e.target.files[0]);
        }
        e.target.value = '';
    });

    function printReport() { window.print(); }

    // Event listeners del resto
    document.getElementById('btnAgregarGasto').onclick = () => {
        document.getElementById('editIndex').value = '-1';
        document.getElementById('modalTitle').innerText = 'Agregar Gasto';
        document.getElementById('gastoForm').reset();
        document.getElementById('modalContado').value = '0';
        document.getElementById('modalCredito').value = '0';
        document.getElementById('gastoModal').style.display = 'flex';
    };
    document.getElementById('closeModalBtn').onclick = () => document.getElementById('gastoModal').style.display = 'none';
    window.onclick = (e) => { if (e.target === document.getElementById('gastoModal')) document.getElementById('gastoModal').style.display = 'none'; };
    document.getElementById('gastoForm').addEventListener('submit', addOrUpdateExpense);
    document.getElementById('searchInput').addEventListener('input', renderTable);
    document.getElementById('statusFilter').addEventListener('change', renderTable);
    document.getElementById('typeFilter').addEventListener('change', renderTable);
    document.getElementById('resetFilters').onclick = () => {
        document.getElementById('searchInput').value = '';
        document.getElementById('statusFilter').value = 'all';
        document.getElementById('typeFilter').value = 'all';
        currentWeekFilter = null;
        renderTable();
    };
    document.getElementById('clearWeekFilterBtn').onclick = () => { currentWeekFilter = null; renderTable(); };
    document.getElementById('exportExcelBtn').onclick = exportToExcel;
    document.getElementById('printBtn').onclick = printReport;
    document.getElementById('deleteAllBtn').onclick = deleteAll;

    renderTable();
</script>
</body>
</html>
